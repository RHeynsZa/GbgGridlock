[build]
builder = "nixpacks"
buildCommand = "apt-get update && apt-get install -y sqitch libdbd-pg-perl postgresql-client && cd backend && pip install -e ."

[deploy]
preDeployCommand = ["cd db && sqitch deploy $DATABASE_URL"]
startCommand = "cd backend && uvicorn gbg_gridlock_api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
