name: Python tests

on:
  push:
    paths:
      - "backend/**"
      - "worker/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "worker/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./${{ matrix.package }} pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest ${{ matrix.package }}/tests -q
