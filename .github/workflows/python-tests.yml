name: Python tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./${{ matrix.package }} pytest pytest-asyncio httpx build

      - name: Run tests
        run: pytest ${{ matrix.package }}/tests -q

      - name: Verify backend package build
        if: matrix.package == 'backend'
        run: python -m build ./${{ matrix.package }}
