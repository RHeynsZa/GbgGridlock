services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: gbggridlock-db
    environment:
      POSTGRES_USER: gbg
      POSTGRES_PASSWORD: gbg
      POSTGRES_DB: gbggridlock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbg -d gbggridlock"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
